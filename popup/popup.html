<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Volume Controller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
      <header class="header">
          <h1>Levels</h1>
          <div class="header-controls">
              <button class="reset-all-btn" id="reset-all" title="Reset all tabs to 100%">
                  Reset all
              </button>
              <div class="settings-wrapper">
                  <button class="settings-btn" id="settings-btn" title="Settings">
                      <svg class="icon" viewBox="0 -960 960 960">
                          <path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z" />
                      </svg>
                  </button>
                  <div class="settings-dropdown hidden" id="settings-dropdown">
                      <div class="settings-item" title="Remember site volume you previously set" data-for="presets-checkbox">
                          <span class="settings-item-content">
                              <span class="settings-item-label">Remember sites</span>
                              <span class="settings-item-description">Apply saved volume per site</span>
                          </span>
                          <span class="toggle-switch-small">
                              <input type="checkbox" id="presets-checkbox">
                              <span class="toggle-slider-small"></span>
                          </span>
                      </div>
                      <div class="settings-divider"></div>
                      <div class="settings-section-title">Volume boost</div>
                      <div class="settings-item" title="Enable volume boost (200%)" data-for="boost-checkbox">
                          <span class="settings-item-content">
                              <span class="settings-item-label">200%</span>
                          </span>
                          <span class="toggle-switch-small">
                              <input type="checkbox" id="boost-checkbox">
                              <span class="toggle-slider-small"></span>
                          </span>
                      </div>
                      <div class="settings-item" title="Enable volume boost (1000%) - may cause audio distortion at high levels" data-for="super-boost-checkbox">
                          <span class="settings-item-content">
                              <span class="settings-item-label">1000%</span>
                              <span class="settings-item-description">May cause audio distortion</span>
                          </span>
                          <span class="toggle-switch-small">
                              <input type="checkbox" id="super-boost-checkbox">
                              <span class="toggle-slider-small"></span>
                          </span>
                      </div>
                  </div>
              </div>
          </div>
      </header>

    <div id="tab-list" class="tab-list">
      <!-- Tabs will be injected here by popup.js -->
    </div>

    <div id="empty-state" class="empty-state hidden">
        <svg class="empty-state-icon" viewBox="0 -960 960 960">
            <path d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Z" />
        </svg>
        <p>No tabs are playing audio</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
